{% extends 'Bases.html' %}
{% load static %}

{% block title %}
User Profile
{% endblock %}

{% block content %}

<!-- Code to stop go to This App without login -->
{% if not request.session.email %}
<script>
    alert("You have to login first. Press OK to go out");
    location.href = "/signup/";
</script>
{% endif %}


<div class="row mt-4">
    <div class="fw-bold display-5 text-warning text-center mb-4">
        <i class="fas fa-user-circle me-3"></i>
        My Account Profile
    </div>
</div>

<div class="row mb-5">
    <div class="col-sm-11 mx-auto">
        <div class="row justify-content-center mt-5">
            <div class="col-lg-8">
                <div class="card shadow-lg p-4 bg-white rounded">
                    <div class="text-center mb-4">
                        <div class="my-3 h3">{{ name }}</div>
                        <img src="/{{ image }}"
                            class="border border-secondary border-3 shadow-lg rounded-4 d-block mx-auto"
                            alt="{{ name }}" height="200px">
                    </div>
                    <h4 class="mb-3 text-secondary border-bottom pb-2">
                        <i class="fas fa-info-circle me-2"></i>
                        Personal Details
                    </h4>
                    <div class="row g-3 mb-4">
                        <div class="col-md-12">
                            <input type="text" class="form-control border-0" value="Name" disabled>
                            <input type="text" class="form-control border-0" value="{{ name }}" disabled>
                        </div>
                        <div class="col-md-12">
                            <input type="text" class="form-control border-0" value="Email" disabled>
                            <input type="text" class="form-control border-0" value="{{ email }}" disabled>
                        </div>
                    </div>
                    <div class="row g-3 mb-5">
                        <div class="col-md-12">
                            <input type="text" class="form-control border-0" value="Phone Number" disabled>
                            <input type="text" class="form-control border-0" value="{{ number }}" disabled>
                        </div>
                        <div class="col-md-12">
                            <input type="text" class="form-control border-0" value="Primary Address" disabled>
                            <input type="text" class="form-control border-0" value="{{ address }}" disabled>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
